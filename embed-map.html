<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renova Clinic Network Map</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100vh;
      background: #090b12;
      overflow: hidden;
    }

    @supports (height: 100dvh) {
      html,
      body {
        height: 100dvh;
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="map-frame"
    title="Renova Clinic Network Map"
    src="maps/embed/embed-map.html">
  </iframe>

  <script>
    // Keep old /embed-map.html URL working while source files live in maps/embed/.
    const frame = document.getElementById("map-frame");
    frame.src = `maps/embed/embed-map.html${window.location.search || ""}${window.location.hash || ""}`;
  </script>
</body>
</html>
